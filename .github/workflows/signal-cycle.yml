name: SQUILL Signal Cycle

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol tertentu (kosong = semua)'
        required: false
        default: ''

jobs:
  get-symbols:
    name: Get Watch List
    runs-on: ubuntu-latest
    outputs:
      symbols: ${{ steps.fetch.outputs.symbols }}
    steps:
      - name: Fetch active symbols
        id: fetch
        run: |
          if [ -n "${{ github.event.inputs.symbol }}" ]; then
            SYMBOLS='["${{ github.event.inputs.symbol }}"]'
          else
            RESPONSE=$(curl -s --max-time 10 \
              -X POST "${{ secrets.SQUILL_API_URL }}/api/write2earn" \
              -H "Content-Type: application/json" \
              -d '{"action":"get_active_symbols","secret":"${{ secrets.SIGNAL_SECRET }}"}')

            # Extract symbols array using jq, fallback to default if fails
            SYMBOLS=$(echo "$RESPONSE" | jq -c '.symbols // ["BTCUSDT","ETHUSDT","BNBUSDT"]' 2>/dev/null || echo '["BTCUSDT","ETHUSDT","BNBUSDT"]')
          fi

          echo "symbols=$SYMBOLS" >> $GITHUB_OUTPUT
          echo "Will process: $SYMBOLS"

  run-signal:
    name: Signal ${{ matrix.symbol }}
    needs: get-symbols
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      matrix:
        symbol: ${{ fromJson(needs.get-symbols.outputs.symbols) }}
      fail-fast: false
      max-parallel: 5

    steps:
      - name: Run signal for ${{ matrix.symbol }}
        run: |
          echo "Processing ${{ matrix.symbol }} at $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SQUILL_API_URL }}/api/write2earn" \
            -H "Content-Type: application/json" \
            --max-time 55 \
            -d '{"action":"run_signal_symbol","secret":"${{ secrets.SIGNAL_SECRET }}","symbol":"${{ matrix.symbol }}"}')

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Failed for ${{ matrix.symbol }}: HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "${{ matrix.symbol }} done"

  summary:
    name: Summary
    needs: [get-symbols, run-signal]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "### SQUILL Signal Cycle - $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Symbols: ${{ needs.get-symbols.outputs.symbols }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.run-signal.result }}" >> $GITHUB_STEP_SUMMARY
