name: SQUILL Grid Bot Tick

on:
  schedule:
    # Every 5 minutes — detects filled orders and places opposite orders
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# Grid ticks run independently from signal cycle — no shared group
concurrency:
  group: squill-grid-tick
  cancel-in-progress: false

jobs:
  tick:
    name: Grid Tick
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Run grid tick
        run: |
          echo "Grid tick at $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SQUILL_API_URL }}/api/grid" \
            -H "Content-Type: application/json" \
            --max-time 50 \
            -d "{\"action\":\"tick\",\"secret\":\"${{ secrets.SIGNAL_SECRET }}\"}")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Grid tick failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

          PROCESSED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('processed', 0))" 2>/dev/null || echo "0")
          echo "Grids processed: $PROCESSED"

      - name: Write summary
        if: always()
        run: |
          echo "### SQUILL Grid Tick — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Checks filled orders and places opposite-side limit orders for all active grids." >> $GITHUB_STEP_SUMMARY
