name: SQUILL Signal Cycle

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol tertentu (kosong = semua)'
        required: false
        default: ''

# ── Concurrency guard (Issue 6) ──────────────────────────────────────────────
# Mencegah dua cycle berjalan bersamaan saat GitHub Actions terlambat
# memulai run berikutnya dan run sebelumnya belum selesai.
#
# cancel-in-progress: false  → run baru akan QUEUE, bukan cancel run lama.
# Ini aman karena setiap symbol punya guard duplikat di level DB
# (_hasOpenPosition + _isCooldown), tapi mencegah race condition pada
# write2earn_open_positions yang dibuka sebelum cooldown tersimpan.
concurrency:
  group: squill-signal-cycle
  cancel-in-progress: false

jobs:
  get-symbols:
    name: Get Watch List
    runs-on: ubuntu-latest
    outputs:
      symbols: ${{ steps.fetch.outputs.symbols }}
    steps:
      - name: Fetch active symbols
        id: fetch
        run: |
          if [ -n "${{ github.event.inputs.symbol }}" ]; then
            SYMBOLS='["${{ github.event.inputs.symbol }}"]'
          else
            RESPONSE=$(curl -s --max-time 10 \
              -X POST "${{ secrets.SQUILL_API_URL }}/api/write2earn" \
              -H "Content-Type: application/json" \
              -d '{"action":"get_active_symbols","secret":"${{ secrets.SIGNAL_SECRET }}"}')

            SYMBOLS=$(echo "$RESPONSE" | jq -c '.symbols // ["BTCUSDT","ETHUSDT","BNBUSDT"]' 2>/dev/null \
              || echo '["BTCUSDT","ETHUSDT","BNBUSDT"]')
          fi

          echo "symbols=$SYMBOLS" >> $GITHUB_OUTPUT
          echo "Will process: $SYMBOLS"

  run-signal:
    name: Signal ${{ matrix.symbol }}
    needs: get-symbols
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      matrix:
        symbol: ${{ fromJson(needs.get-symbols.outputs.symbols) }}
      fail-fast: false   # satu symbol gagal tidak membatalkan symbol lain
      max-parallel: 5

    steps:
      - name: Run signal for ${{ matrix.symbol }}
        # ── Retry (Issue 5) ───────────────────────────────────────────────────
        # Mencoba ulang hingga 2 kali jika gagal (Binance timeout / Vercel cold start).
        # Setiap percobaan diberi jeda 10 detik sebelum retry.
        run: |
          echo "Processing ${{ matrix.symbol }} at $(date -u)"

          MAX_ATTEMPTS=2
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "--- Attempt $ATTEMPT of $MAX_ATTEMPTS ---"

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "${{ secrets.SQUILL_API_URL }}/api/write2earn" \
              -H "Content-Type: application/json" \
              --max-time 55 \
              -d '{"action":"run_signal_symbol","secret":"${{ secrets.SIGNAL_SECRET }}","symbol":"${{ matrix.symbol }}"}')

            HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            echo "HTTP Status: $HTTP_STATUS"
            echo "Response: $BODY"

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "${{ matrix.symbol }} done ✓"
              SUCCESS=true
              break
            fi

            echo "Failed (HTTP $HTTP_STATUS)"
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Retrying in 10s..."
              sleep 10
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "All $MAX_ATTEMPTS attempts failed for ${{ matrix.symbol }}"
            exit 1
          fi

  summary:
    name: Summary
    needs: [get-symbols, run-signal]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "### SQUILL Signal Cycle — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Symbols | \`${{ needs.get-symbols.outputs.symbols }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status  | ${{ needs.run-signal.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
